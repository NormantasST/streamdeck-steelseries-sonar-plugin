<!DOCTYPE html>
<html>

<head lang="en">
    <title>Volume Mixer Controls</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <!--
        Learn more about property inspector components at https://sdpi-components.dev/docs/components
    -->
    <sdpi-item label="Volume Mixer Mode">
        <sdpi-select setting="mode" default="increase" placeholder="Please Chose a Channel">
            <option value="increase">Increase Volume By %</option>
            <option value="decrease">Decrease Volume By %</option>
            <option value="setVolumeTo">Set Volume To %</option>
        </sdpi-select>
    </sdpi-item>
    
    <sdpi-item label="Volume Change/Set Value">
        <sdpi-range
        type="number"
        setting="changeChannelValue"
        default="5"
        placeholder="Enter Volume %"
        min="0"
        max="100" showlabels>
            <span slot="min">0%</span>
            <span slot="max">100%</span>
        </sdpi-range>
    </sdpi-item>
    

    <sdpi-item label="Volume Mixer Channel">
        <sdpi-select setting="targetChannel" default="Classic Master" placeholder="Please Chose a Channel">
            <optgroup label="Classic Mode">
                <option value="Classic Master">Master</option>
                <option value="Classic Game">Game</option>
                <option value="Classic Chat">Chat</option>
                <option value="Classic Media">Media</option>
                <option value="Classic Aux">Aux</option>
                <option value="Classic Mic">Microphone</option>
            </optgroup>
        </sdpi-select>
    </sdpi-item>
    
</body>

</html>
